<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hello PWA</title>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS Specific configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hello PWA">
    
    <!-- 
      iOS Icon: You must place a png named 'icon-192.png' in the root. 
      iOS doesn't use the manifest icons for the home screen automatically.
    -->
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>Tech Tracker</h1>
        </div>

        <!-- VIEW 1: Hardware News -->
        <div id="view-news" class="view-container active-view">
            <div id="ptr-indicator" class="ptr-indicator">
                <div id="ptr-spinner" class="ptr-spinner"></div>
                <span id="ptr-text">Pull down to refresh</span>
            </div>
            <div id="news-content"></div>
        </div>

        <!-- VIEW 2: Gemini Chat -->
        <div id="view-chat" class="view-container">
            <div class="chat-messages" id="chat-history">
                <div class="message msg-ai">Hello! I can help you with tech specs and pricing analysis.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask Gemini..." style="flex:1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <button id="chat-send" class="action-btn" style="width: auto;">Send</button>
            </div>
        </div>

        <!-- VIEW 3: Speaker Prices -->
        <div id="view-speakers" class="view-container">
            <div id="speakers-content"></div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="news" onclick="switchTab('news')">Market Watch</button>
            <button class="nav-btn" data-tab="chat" onclick="switchTab('chat')">Gemini Chat</button>
            <button class="nav-btn" data-tab="speakers" onclick="switchTab('speakers')">Speakers NL</button>
        </nav>
    </div>

    <script>
        // --- 1. Tab Switching Logic ---
        function switchTab(tabName) {
            // Hide all views
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active-view'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected
            document.getElementById(`view-${tabName}`).classList.add('active-view');
            
            // Highlight matching button
            const activeBtn = document.querySelector(`.nav-btn[data-tab="${tabName}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // --- 2. Hardware News Logic ---
        let hardwareData = [
            { name: "NVIDIA H100 80GB", price: "$30,000 - $40,000", desc: "Hopper architecture. High demand stabilizing, lead times reducing." },
            { name: "NVIDIA A100 80GB", price: "$12,000 - $15,000", desc: "Ampere architecture. Robust availability on secondary markets." },
            { name: "AMD Instinct MI300X", price: "$15,000 - $20,000", desc: "Strong competitor in generative AI inference benchmarks." },
            { name: "AMD Instinct MI350X", price: "Est. Q4 2024", desc: "Upcoming CDNA 4. Expected to rival H200 in memory bandwidth." },
            { name: "NVIDIA RTX 4090", price: "$1,850", desc: "Consumer flagship. Pricing slightly up due to import restrictions in some regions." }
        ];

        const newsContent = document.getElementById('news-content');
        
        function renderNews() {
            newsContent.innerHTML = '';
            hardwareData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = `
                    <div class="price-header">
                        <span class="hardware-name">${item.name}</span>
                        <span class="hardware-price">${item.price}</span>
                    </div>
                    <div class="price-desc">${item.desc}</div>
                `;
                newsContent.appendChild(card);
            });
        }
        renderNews();

        // --- 2b. Speaker Prices Logic ---
        const DEFAULT_SPEAKER_MODEL = 'KEF LS60 Wireless';
        const ALL_SPEAKERS_FILTER = 'All speakers';

        const speakersData = [
            { model: DEFAULT_SPEAKER_MODEL, shop: "Stassen Hifi", price: "EUR 4,999 / pair", desc: "KEF LS60 Wireless in multiple finishes, Dutch shipping available.", url: "https://www.stassen.nl" },
            { model: DEFAULT_SPEAKER_MODEL, shop: "HelloTV", price: "EUR 4,999 / pair", desc: "Online listing for LS60 Wireless, often bundled with setup service.", url: "https://www.hellotv.nl" },
            { model: DEFAULT_SPEAKER_MODEL, shop: "Wifimedia", price: "EUR 4,999 / pair", desc: "Specialist audio retailer in NL with in-store demo availability.", url: "https://www.wifimedia.eu" },
            { model: DEFAULT_SPEAKER_MODEL, shop: "Eijerkamp", price: "EUR 4,999 / pair", desc: "Premium audio catalog entry for KEF LS60 Wireless.", url: "https://www.eijerkamp.nl" },
            { model: DEFAULT_SPEAKER_MODEL, shop: "Hifi Klubben (NL)", price: "EUR 4,999 / pair", desc: "Dutch branch listing and local support options.", url: "https://www.hifiklubben.nl" }
        ];

        const SPEAKERS_STORAGE_KEY = 'kef-ls60-custom-sites';
        let currentSpeakerFilter = DEFAULT_SPEAKER_MODEL;
        let editingCustomIndex = null;

        const speakersContent = document.getElementById('speakers-content');

        function getCustomSpeakerSites() {
            try {
                const raw = localStorage.getItem(SPEAKERS_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveCustomSpeakerSites(items) {
            localStorage.setItem(SPEAKERS_STORAGE_KEY, JSON.stringify(items));
        }

        function getAllSpeakerSites() {
            const customSites = getCustomSpeakerSites().map((item, index) => ({
                ...item,
                _isCustom: true,
                _customIndex: index
            }));
            const defaultSites = speakersData.map(item => ({
                ...item,
                _isCustom: false
            }));
            return [...customSites, ...defaultSites];
        }

        function getSpeakerModels() {
            const models = new Set(
                getAllSpeakerSites()
                    .map(item => item.model)
                    .filter(Boolean)
            );
            return [ALL_SPEAKERS_FILTER, ...Array.from(models)];
        }

        function normalizeUrl(value) {
            const trimmed = value.trim();
            if (!trimmed) return '';
            if (trimmed.startsWith('http://') || trimmed.startsWith('https://')) return trimmed;
            return `https://${trimmed}`;
        }

        function renderSpeakers() {
            speakersContent.innerHTML = '';

            const info = document.createElement('div');
            info.className = 'price-card';
            info.innerHTML = `
                <div class="price-desc">Track online prices for different speaker models from shops in the Netherlands. Values are indicative and can change quickly.</div>
            `;
            speakersContent.appendChild(info);

            const models = getSpeakerModels();
            if (!models.includes(currentSpeakerFilter)) {
                currentSpeakerFilter = ALL_SPEAKERS_FILTER;
            }

            const filterCard = document.createElement('div');
            filterCard.className = 'price-card';
            filterCard.innerHTML = `
                <div class="form-title">Speaker model</div>
                <select id="speaker-filter" class="site-input">
                    ${models.map(model => `<option value="${model}" ${model === currentSpeakerFilter ? 'selected' : ''}>${model}</option>`).join('')}
                </select>
            `;
            speakersContent.appendChild(filterCard);

            const speakerFilter = filterCard.querySelector('#speaker-filter');
            speakerFilter.addEventListener('change', () => {
                currentSpeakerFilter = speakerFilter.value;
                renderSpeakers();
            });

            const formCard = document.createElement('div');
            formCard.className = 'price-card';
            formCard.innerHTML = `
                <div class="form-title">Add or edit website</div>
                <div class="site-form-grid">
                    <input id="site-model" class="site-input" type="text" placeholder="Speaker model (required)" value="${currentSpeakerFilter === ALL_SPEAKERS_FILTER ? DEFAULT_SPEAKER_MODEL : currentSpeakerFilter}">
                    <input id="site-shop" class="site-input" type="text" placeholder="Shop name (required)">
                    <input id="site-price" class="site-input" type="text" placeholder="Price e.g. EUR 4,899 / pair">
                    <input id="site-url" class="site-input" type="url" placeholder="Website URL e.g. shop.nl/product">
                    <input id="site-desc" class="site-input" type="text" placeholder="Short note">
                </div>
                <div class="site-form-actions">
                    <button id="site-save-btn" class="action-btn">Add website</button>
                    <button id="site-cancel-btn" class="action-btn secondary-btn" style="display:none; margin-top: 8px;">Cancel edit</button>
                </div>
                <div id="site-form-message" class="form-message"></div>
            `;
            speakersContent.appendChild(formCard);

            const siteSaveBtn = formCard.querySelector('#site-save-btn');
            const siteCancelBtn = formCard.querySelector('#site-cancel-btn');
            const siteMessage = formCard.querySelector('#site-form-message');
            const siteModel = formCard.querySelector('#site-model');
            const siteShop = formCard.querySelector('#site-shop');
            const sitePrice = formCard.querySelector('#site-price');
            const siteUrl = formCard.querySelector('#site-url');
            const siteDesc = formCard.querySelector('#site-desc');

            function resetForm() {
                editingCustomIndex = null;
                siteSaveBtn.textContent = 'Add website';
                siteCancelBtn.style.display = 'none';
                siteModel.value = currentSpeakerFilter === ALL_SPEAKERS_FILTER ? DEFAULT_SPEAKER_MODEL : currentSpeakerFilter;
                siteShop.value = '';
                sitePrice.value = '';
                siteUrl.value = '';
                siteDesc.value = '';
            }

            siteSaveBtn.addEventListener('click', () => {
                const model = siteModel.value.trim();
                const shop = siteShop.value.trim();
                const price = sitePrice.value.trim() || 'Price not listed';
                const url = normalizeUrl(siteUrl.value);
                const desc = siteDesc.value.trim() || 'User-added website.';

                if (!model) {
                    siteMessage.textContent = 'Please enter a speaker model.';
                    return;
                }

                if (!shop) {
                    siteMessage.textContent = 'Please enter a shop name.';
                    return;
                }

                const customSites = getCustomSpeakerSites();
                if (editingCustomIndex === null) {
                    customSites.unshift({ model, shop, price, desc, url });
                } else {
                    customSites[editingCustomIndex] = { model, shop, price, desc, url };
                }
                saveCustomSpeakerSites(customSites);
                currentSpeakerFilter = model;

                siteMessage.textContent = editingCustomIndex === null ? 'Website added.' : 'Website updated.';
                resetForm();
                renderSpeakers();
            });

            siteCancelBtn.addEventListener('click', () => {
                siteMessage.textContent = 'Edit cancelled.';
                resetForm();
            });

            const allSpeakerSites = getAllSpeakerSites().filter(item => {
                if (currentSpeakerFilter === ALL_SPEAKERS_FILTER) return true;
                return item.model === currentSpeakerFilter;
            });

            allSpeakerSites.forEach(item => {
                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = `
                    <div class="price-header">
                        <span class="hardware-name">${item.shop}</span>
                        <span class="hardware-price">${item.price}</span>
                    </div>
                    <div class="speaker-model">${item.model || DEFAULT_SPEAKER_MODEL}</div>
                    <div class="price-desc">${item.desc}</div>
                    ${item.url ? `<a class="shop-link" href="${item.url}" target="_blank" rel="noopener noreferrer">Visit website</a>` : ''}
                    ${item._isCustom ? `<div class="item-actions"><button class="small-btn site-edit-btn" data-index="${item._customIndex}">Edit</button><button class="small-btn small-btn-danger site-delete-btn" data-index="${item._customIndex}">Delete</button></div>` : ''}
                `;
                speakersContent.appendChild(card);
            });

            speakersContent.querySelectorAll('.site-edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = Number(btn.getAttribute('data-index'));
                    const customSites = getCustomSpeakerSites();
                    const selected = customSites[index];
                    if (!selected) return;

                    editingCustomIndex = index;
                    siteSaveBtn.textContent = 'Save changes';
                    siteCancelBtn.style.display = 'block';
                    siteMessage.textContent = 'Editing custom website.';
                    siteModel.value = selected.model || DEFAULT_SPEAKER_MODEL;
                    siteShop.value = selected.shop || '';
                    sitePrice.value = selected.price || '';
                    siteUrl.value = selected.url || '';
                    siteDesc.value = selected.desc || '';
                    siteModel.focus();
                });
            });

            speakersContent.querySelectorAll('.site-delete-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = Number(btn.getAttribute('data-index'));
                    const customSites = getCustomSpeakerSites();
                    const selected = customSites[index];
                    if (!selected) return;

                    customSites.splice(index, 1);
                    saveCustomSpeakerSites(customSites);
                    if (editingCustomIndex === index) editingCustomIndex = null;
                    renderSpeakers();
                });
            });
        }
        renderSpeakers();

        // Pull-to-Refresh Logic
        const viewNews = document.getElementById('view-news');
        const ptrIndicator = document.getElementById('ptr-indicator');
        const ptrSpinner = document.getElementById('ptr-spinner');
        const ptrText = document.getElementById('ptr-text');
        let startY = 0;

        viewNews.addEventListener('touchstart', (e) => {
            if (viewNews.scrollTop === 0) startY = e.touches[0].clientY;
        }, { passive: true });

        viewNews.addEventListener('touchmove', (e) => {
            const delta = e.touches[0].clientY - startY;
            if (viewNews.scrollTop === 0 && delta > 0 && delta < 200) {
                ptrIndicator.style.marginTop = `${delta - 50}px`;
                ptrText.innerText = delta > 60 ? 'Release to refresh' : 'Pull down to refresh';
            }
        }, { passive: true });

        viewNews.addEventListener('touchend', () => {
            const margin = parseInt(ptrIndicator.style.marginTop || '-50');
            if (margin > -10) {
                ptrIndicator.style.marginTop = '0px';
                ptrText.innerText = 'Updating prices...';
                ptrSpinner.style.display = 'block';
                setTimeout(updatePrices, 1500);
            } else {
                ptrIndicator.style.marginTop = '-50px';
            }
        });

        function updatePrices() {
            // Simulate price fluctuation
            hardwareData = hardwareData.map(d => ({ ...d, price: d.price.replace(/\$([0-9,]+)/g, (m, p1) => '$' + Math.floor(parseInt(p1.replace(/,/g,'')) * (0.95 + Math.random() * 0.1)).toLocaleString()) }));
            renderNews();
            ptrSpinner.style.display = 'none';
            ptrIndicator.style.marginTop = '-50px';
        }

        // --- 3. Chat Logic ---
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const chatHistory = document.getElementById('chat-history');

        // Placeholder for Gemini API Key - DO NOT EXPOSE REAL KEYS IN CLIENT SIDE CODE
        const GEMINI_API_KEY = ""; 

        chatSend.addEventListener('click', handleChat);
        
        async function handleChat() {
            const text = chatInput.value.trim();
            if (!text) return;

            // 1. Add User Message
            addMessage(text, 'user');
            chatInput.value = '';

            // 2. Add Loading State
            const loadingId = addMessage("Thinking...", 'ai');

            // 3. Mock or Real Call
            let responseText = "";
            
            if (GEMINI_API_KEY) {
                // Real API implementation would go here using fetch() to Google Generative AI REST API
                // This requires a backend proxy to be secure.
                responseText = "Error: API calls require a backend to hide your API key.";
            } else {
                // Simulation for Demo purposes
                await new Promise(r => setTimeout(r, 1000));
                responseText = simulateGeminiResponse(text);
            }

            // 4. Update UI
            const loadingMsg = document.querySelector(`[data-id="${loadingId}"]`);
            if (loadingMsg) loadingMsg.textContent = responseText;
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            const id = Date.now();
            msgDiv.className = `message msg-${sender}`;
            msgDiv.textContent = text;
            msgDiv.setAttribute('data-id', id);
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return id;
        }

        function simulateGeminiResponse(input) {
            const lower = input.toLowerCase();
            if (lower.includes('price') || lower.includes('cost')) return "Based on current market data, H100s are trading around $30k, while the MI300X offers a competitive alternative around $15k-$20k.";
            if (lower.includes('nvidia') || lower.includes('h100')) return "The NVIDIA H100 is currently the industry standard for LLM training, featuring the Transformer Engine.";
            return "I can help you analyze hardware trends. Try asking about 'H100 prices' or 'AMD specs'.";
        }

        // 2. Service Worker Registration
        // We check if the browser supports Service Workers
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('ServiceWorker registration successful: ', reg.scope);
                        
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification(newWorker);
                                }
                            });
                        });
                    })
                    .catch(err => console.log('ServiceWorker registration failed: ', err));
            });

            let refreshing;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }

        function showUpdateNotification(worker) {
            const div = document.createElement('div');
            div.className = 'update-notification';
            div.innerHTML = '<span>New version available</span> <button class="update-btn">Refresh</button>';
            document.body.appendChild(div);
            div.querySelector('button').addEventListener('click', () => {
                worker.postMessage({ type: 'SKIP_WAITING' });
            });
        }
    </script>
</body>
</html>
